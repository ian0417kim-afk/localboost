<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF6EB"/><stop offset="1" stop-color="#F0E4CF"/>
    </linearGradient>
    <linearGradient id="woodCl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCC5A0"/><stop offset="1" stop-color="#A88158"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#cbg)"/>
  <!-- ceiling -->
  <rect x="0" y="0" width="600" height="60" fill="#F5ECD9"/>
  <path d="M 0 60 Q 300 80 600 60 L 600 80 L 0 80 Z" fill="#F0E4CF"/>
  <!-- ceiling light -->
  <rect x="250" y="18" width="90" height="30" rx="6" fill="#FAF3E4" stroke="#C4B494"/>
  <rect x="255" y="22" width="80" height="22" rx="4" fill="#FFFACC" opacity="0.55"/>

  <!-- wood accent wall right -->
  <rect x="370" y="60" width="230" height="260" fill="url(#woodCl)"/>
  <g stroke="#8E6E45" stroke-width="0.7" opacity="0.35">
    <line x1="390" y1="60" x2="390" y2="320"/><line x1="430" y1="60" x2="430" y2="320"/>
    <line x1="470" y1="60" x2="470" y2="320"/><line x1="510" y1="60" x2="510" y2="320"/>
    <line x1="550" y1="60" x2="550" y2="320"/>
  </g>
  <!-- gas outlets -->
  <g fill="#3A3228">
    <circle cx="405" cy="170" r="4"/><circle cx="430" cy="170" r="4"/>
    <circle cx="455" cy="170" r="4"/><circle cx="480" cy="170" r="4"/>
  </g>
  <!-- reading lamp -->
  <line x1="375" y1="210" x2="335" y2="250" stroke="#2A231D" stroke-width="2"/>
  <rect x="320" y="248" width="18" height="12" fill="#2A231D"/>
  <circle cx="330" cy="254" r="3" fill="#FFE5B0"/>

  <!-- curtains left -->
  <rect x="40" y="70" width="210" height="250" fill="#FAF3E4" opacity="0.82"/>
  <g stroke="#D4C4A0" stroke-width="0.6" opacity="0.55">
    <line x1="70" y1="70" x2="70" y2="320"/><line x1="100" y1="70" x2="100" y2="320"/>
    <line x1="130" y1="70" x2="130" y2="320"/><line x1="160" y1="70" x2="160" y2="320"/>
    <line x1="190" y1="70" x2="190" y2="320"/><line x1="220" y1="70" x2="220" y2="320"/>
  </g>
  <rect x="230" y="70" width="20" height="250" fill="#6B5D46"/>

  <!-- hospital bed -->
  <g>
    <rect x="260" y="250" width="210" height="26" fill="#FAF6EC"/>
    <rect x="260" y="250" width="210" height="5" fill="#E8DEC9"/>
    <rect x="260" y="276" width="210" height="55" fill="#F5ECD9"/>
    <rect x="260" y="331" width="210" height="18" fill="#E0D2B8"/>
    <rect x="440" y="200" width="30" height="70" fill="#CFBE98"/>
    <rect x="390" y="235" width="65" height="25" rx="5" fill="#FFFBF0"/>
    <rect x="268" y="254" width="170" height="12" fill="#C8A888"/>
    <circle cx="280" cy="350" r="7" fill="#3A2F25"/>
    <circle cx="452" cy="350" r="7" fill="#3A2F25"/>
    <rect x="288" y="220" width="100" height="6" fill="#2A231D"/>
    <line x1="335" y1="226" x2="335" y2="260" stroke="#5E4A36" stroke-width="3"/>
  </g>

  <!-- wingback chair (terracotta) -->
  <g>
    <path d="M 80 300 Q 80 230 130 225 Q 180 230 180 300 L 170 370 Q 130 378 90 370 Z" fill="#B07358"/>
    <path d="M 80 300 Q 70 220 105 200 L 120 230 Q 105 280 100 310 Z" fill="#8F5A44"/>
    <path d="M 180 300 Q 190 220 155 200 L 140 230 Q 155 280 160 310 Z" fill="#8F5A44"/>
    <rect x="92" y="370" width="5" height="20" fill="#2A231D"/>
    <rect x="160" y="370" width="5" height="20" fill="#2A231D"/>
  </g>
  <!-- floor -->
  <rect x="0" y="390" width="600" height="60" fill="#E5D7B8"/>

  <!-- Top brand -->
  <g transform="translate(30 28)">
    <g stroke="#C28568" stroke-width="1.5" fill="none">
      <circle cx="12" cy="12" r="11"/>
      <line x1="5" y1="12" x2="19" y2="12"/><line x1="12" y1="5" x2="12" y2="19"/>
    </g>
    <text x="32" y="18" font-family="Fraunces, Georgia, serif" font-size="18" fill="#2A231D" letter-spacing="-0.01em">ONHWA<tspan font-style="italic" font-weight="300" font-size="13" fill="#8C7E6E" dx="4">· 온화 의원</tspan></text>
  </g>
  <!-- bottom label -->
  <text x="30" y="430" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="14" fill="#8A5740">가정의학과 · 내과</text>
  <text x="250" y="430" font-family="Pretendard, sans-serif" font-size="12" font-weight="500" fill="#2A231D">예약제 · 웜톤 부티크 의원</text>
</svg>
