<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAF6"/><stop offset="1" stop-color="#EDF0EB"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#abg)"/>
  <!-- wood slat wall back -->
  <rect x="0" y="0" width="600" height="290" fill="#E0C69C"/>
  <g stroke="#B48F5F" stroke-width="1" opacity="0.55">
    <line x1="50" y1="0" x2="50" y2="290"/><line x1="110" y1="0" x2="110" y2="290"/><line x1="170" y1="0" x2="170" y2="290"/>
    <line x1="230" y1="0" x2="230" y2="290"/><line x1="290" y1="0" x2="290" y2="290"/><line x1="350" y1="0" x2="350" y2="290"/>
    <line x1="410" y1="0" x2="410" y2="290"/><line x1="470" y1="0" x2="470" y2="290"/><line x1="530" y1="0" x2="530" y2="290"/>
  </g>
  <!-- study booths (partitions) -->
  <g>
    <rect x="85" y="40" width="5" height="250" fill="#F5EFDE"/>
    <rect x="205" y="40" width="5" height="250" fill="#F5EFDE"/>
    <rect x="325" y="40" width="5" height="250" fill="#F5EFDE"/>
    <rect x="445" y="40" width="5" height="250" fill="#F5EFDE"/>
  </g>
  <!-- LED strips -->
  <rect x="90" y="180" width="115" height="3" fill="#AED6DE"/>
  <rect x="210" y="180" width="115" height="3" fill="#AED6DE"/>
  <rect x="330" y="180" width="115" height="3" fill="#AED6DE"/>
  <rect x="450" y="180" width="115" height="3" fill="#AED6DE"/>
  <!-- desks -->
  <rect x="90" y="220" width="115" height="70" fill="#F5EFDE"/>
  <rect x="210" y="220" width="115" height="70" fill="#F5EFDE"/>
  <rect x="330" y="220" width="115" height="70" fill="#F5EFDE"/>
  <rect x="450" y="220" width="115" height="70" fill="#F5EFDE"/>
  <g fill="#E0D8B8">
    <rect x="90" y="220" width="115" height="4"/>
    <rect x="210" y="220" width="115" height="4"/>
    <rect x="330" y="220" width="115" height="4"/>
    <rect x="450" y="220" width="115" height="4"/>
  </g>
  <!-- chairs -->
  <g fill="#3E3934">
    <rect x="118" y="290" width="60" height="55" rx="6"/>
    <rect x="238" y="290" width="60" height="55" rx="6"/>
    <rect x="358" y="290" width="60" height="55" rx="6"/>
    <rect x="478" y="290" width="60" height="55" rx="6"/>
  </g>
  <g stroke="#3E3934" stroke-width="2">
    <line x1="125" y1="345" x2="125" y2="385"/><line x1="170" y1="345" x2="170" y2="385"/>
    <line x1="245" y1="345" x2="245" y2="385"/><line x1="290" y1="345" x2="290" y2="385"/>
    <line x1="365" y1="345" x2="365" y2="385"/><line x1="410" y1="345" x2="410" y2="385"/>
    <line x1="485" y1="345" x2="485" y2="385"/><line x1="530" y1="345" x2="530" y2="385"/>
  </g>
  <!-- floor -->
  <rect x="0" y="385" width="600" height="65" fill="#E8D9BA"/>
  <!-- ceiling lights -->
  <g fill="#FFFACC">
    <circle cx="120" cy="20" r="4"/><circle cx="300" cy="20" r="4"/><circle cx="480" cy="20" r="4"/>
  </g>

  <!-- Top-left brand -->
  <g>
    <rect x="30" y="24" width="20" height="20" rx="3" fill="#2C6F5A"/>
    <rect x="35" y="29" width="10" height="10" fill="none" stroke="#FAFAF6" stroke-width="1.5"/>
    <text x="60" y="40" font-family="Pretendard, sans-serif" font-size="15" font-weight="700" fill="#17201A" letter-spacing="-0.01em">SEUM <tspan font-size="12" font-weight="400" fill="#747872">· 세움 학원</tspan></text>
  </g>
  <!-- bottom label -->
  <text x="30" y="430" font-family="Pretendard, sans-serif" font-size="13" font-weight="600" fill="#17201A">개별 자습관 · 24석</text>
  <text x="230" y="430" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="12" fill="#2C6F5A">한 반 최대 8명 · 소수 정예</text>
</svg>
