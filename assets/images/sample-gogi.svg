<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="gogiBg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#4A3020"/>
      <stop offset="0.7" stop-color="#1E1612"/>
      <stop offset="1" stop-color="#0F0D0A"/>
    </radialGradient>
    <radialGradient id="gogiGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0B968"/>
      <stop offset="0.5" stop-color="#D97849" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#8E3A20" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#gogiBg)"/>
  <!-- pendant light top -->
  <line x1="300" y1="0" x2="300" y2="80" stroke="#2A2118" stroke-width="2"/>
  <polygon points="270,80 330,80 320,110 280,110" fill="#2A1A14"/>
  <circle cx="300" cy="130" r="10" fill="#F0B968"/>
  <circle cx="300" cy="130" r="32" fill="#F0B968" opacity="0.3"/>
  <!-- grill table -->
  <rect x="100" y="270" width="400" height="120" fill="#5E4028"/>
  <rect x="100" y="270" width="400" height="12" fill="#8A5E3A"/>
  <!-- grill center -->
  <rect x="180" y="250" width="240" height="70" fill="#0F0A05"/>
  <rect x="180" y="250" width="240" height="8" fill="#2A1E14"/>
  <!-- ember glow -->
  <rect x="190" y="268" width="220" height="48" fill="url(#gogiGlow)"/>
  <g fill="#F0B968" opacity="0.9">
    <circle cx="230" cy="290" r="3"/><circle cx="270" cy="285" r="2.5"/>
    <circle cx="310" cy="295" r="3.5"/><circle cx="350" cy="288" r="2.5"/>
    <circle cx="380" cy="292" r="3"/>
  </g>
  <!-- meat on grill -->
  <g fill="#8E3A20">
    <ellipse cx="240" cy="265" rx="24" ry="7"/>
    <ellipse cx="300" cy="268" rx="22" ry="6"/>
    <ellipse cx="360" cy="264" rx="26" ry="7"/>
  </g>
  <!-- marbling highlights -->
  <g stroke="#F5EFE0" stroke-width="1" opacity="0.5" fill="none">
    <path d="M 220 263 Q 240 259 260 263"/>
    <path d="M 282 266 Q 300 262 318 266"/>
    <path d="M 340 262 Q 360 258 380 262"/>
  </g>
  <!-- smoke -->
  <g fill="#D4C9B4" opacity="0.2">
    <ellipse cx="240" cy="230" rx="22" ry="8"/>
    <ellipse cx="300" cy="220" rx="28" ry="10"/>
    <ellipse cx="360" cy="228" rx="22" ry="8"/>
  </g>
  <!-- side plates -->
  <ellipse cx="140" cy="285" rx="26" ry="6" fill="#1A1410"/>
  <ellipse cx="140" cy="280" rx="26" ry="6" fill="#2E3A28"/>
  <ellipse cx="460" cy="285" rx="26" ry="6" fill="#1A1410"/>
  <ellipse cx="460" cy="280" rx="26" ry="6" fill="#8B3020"/>

  <!-- wordmark -->
  <text x="40" y="58" font-family="Fraunces, Georgia, serif" font-size="28" fill="#F5EFE0" letter-spacing="0.02em">GOGIPYEONAE</text>
  <text x="40" y="80" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="16" fill="#F0B968" letter-spacing="0.04em">고기편애</text>
  <!-- bottom caption -->
  <text x="40" y="415" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="13" fill="#D97849">Jeju Premium Meat Restaurant</text>
  <text x="40" y="432" font-family="Pretendard, sans-serif" font-size="11" fill="#8A7F6E" letter-spacing="0.06em">매일 경매 한우 · 드라이 에이징 14일</text>
</svg>
