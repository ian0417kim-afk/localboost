<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6E8DE"/><stop offset="1" stop-color="#E9CEC0"/>
    </linearGradient>
    <linearGradient id="skinN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8E4D4"/><stop offset="1" stop-color="#E9C5B1"/>
    </linearGradient>
    <linearGradient id="naN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5B0A2"/><stop offset="1" stop-color="#C08275"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#nbg)"/>
  <ellipse cx="300" cy="230" rx="240" ry="180" fill="#E0B8A7" opacity="0.3"/>

  <!-- Abstract hand at angle -->
  <g transform="translate(300 260)">
    <!-- palm -->
    <path d="M -100 90 Q -120 10 -80 -50 Q -30 -75 40 -70 Q 100 -45 100 30 Q 95 105 60 140 L -50 145 Z" fill="url(#skinN)"/>
    <!-- sleeve -->
    <path d="M -80 140 L 75 140 L 95 220 L -100 220 Z" fill="#EFE2D0"/>
    <!-- thumb -->
    <g transform="rotate(-28)">
      <rect x="-128" y="-30" width="40" height="75" rx="20" fill="url(#skinN)"/>
      <ellipse cx="-108" cy="-30" rx="15" ry="18" fill="url(#naN)"/>
    </g>
    <!-- index -->
    <g>
      <rect x="-50" y="-180" width="32" height="140" rx="16" fill="url(#skinN)"/>
      <path d="M -50 -180 Q -34 -205 -18 -180 Q -18 -160 -34 -156 Q -50 -160 -50 -180 Z" fill="url(#naN)"/>
    </g>
    <!-- middle -->
    <g>
      <rect x="-8" y="-200" width="34" height="158" rx="17" fill="url(#skinN)"/>
      <path d="M -8 -200 Q 9 -226 26 -200 Q 26 -177 9 -172 Q -8 -177 -8 -200 Z" fill="url(#naN)"/>
    </g>
    <!-- ring -->
    <g>
      <rect x="32" y="-187" width="32" height="145" rx="16" fill="url(#skinN)"/>
      <path d="M 32 -187 Q 48 -212 64 -187 Q 64 -164 48 -159 Q 32 -164 32 -187 Z" fill="url(#naN)"/>
      <rect x="31" y="-62" width="34" height="5" fill="#D9B675"/>
    </g>
    <!-- pinky -->
    <g>
      <rect x="72" y="-155" width="28" height="112" rx="14" fill="url(#skinN)"/>
      <path d="M 72 -155 Q 86 -176 100 -155 Q 100 -136 86 -132 Q 72 -136 72 -155 Z" fill="url(#naN)"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="40" y="60" font-family="Cormorant, Georgia, serif" font-style="italic" font-size="36" fill="#2B201C" letter-spacing="0.02em">mood nail</text>
  <text x="40" y="82" font-family="Cormorant, Georgia, serif" font-style="italic" font-size="13" fill="#B08A7E">♡ Private nail studio</text>

  <!-- bottom caption -->
  <text x="40" y="420" font-family="Cormorant, Georgia, serif" font-style="italic" font-size="14" fill="#8C7B74">signature № 01 · rose · the quiet mood</text>
</svg>
