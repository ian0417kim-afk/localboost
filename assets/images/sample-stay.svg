<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E2B3F"/><stop offset="0.55" stop-color="#3F4C63"/><stop offset="1" stop-color="#8A7B68"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE0A0"/><stop offset="1" stop-color="#D2884A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#sky)"/>
  <!-- mountain silhouettes -->
  <polygon points="0,280 160,220 320,250 480,215 600,235 600,290 0,290" fill="#1A1F2C" opacity="0.55"/>
  <polygon points="0,310 140,260 280,280 440,250 600,275 600,340 0,340" fill="#141824" opacity="0.7"/>
  <!-- ground -->
  <polygon points="0,330 600,310 600,450 0,450" fill="#2A2821"/>
  <!-- left volume (angular) -->
  <polygon points="180,180 260,170 260,330 180,325" fill="#EEE7D6"/>
  <polygon points="260,170 345,155 345,330 260,330" fill="#F5EEE0"/>
  <polygon points="260,170 303,130 345,155" fill="#FCF7EB"/>
  <polygon points="180,180 240,125 303,130 260,170" fill="#E3DCC9"/>
  <rect x="275" y="175" width="60" height="110" fill="url(#glow)"/>
  <line x1="275" y1="225" x2="335" y2="225" stroke="#3A2E20" stroke-width="1.5"/>
  <line x1="305" y1="175" x2="305" y2="285" stroke="#3A2E20" stroke-width="1.5"/>
  <polygon points="275,172 303,140 335,155 335,172" fill="url(#glow)" opacity="0.9"/>
  <!-- right volume -->
  <polygon points="360,165 430,172 430,325 360,322" fill="#EEE7D6"/>
  <polygon points="430,172 500,180 500,325 430,325" fill="#F5EEE0"/>
  <polygon points="360,165 395,130 460,140 430,172" fill="#FCF7EB"/>
  <rect x="444" y="182" width="48" height="95" fill="url(#glow)" opacity="0.95"/>
  <line x1="444" y1="228" x2="492" y2="228" stroke="#3A2E20" stroke-width="1.5"/>
  <line x1="468" y1="182" x2="468" y2="277" stroke="#3A2E20" stroke-width="1.5"/>
  <rect x="370" y="200" width="28" height="50" fill="url(#glow)" opacity="0.88"/>
  <!-- base -->
  <rect x="180" y="325" width="320" height="30" fill="#D8CFB8"/>
  <rect x="230" y="332" width="36" height="22" fill="#8B6B45"/>
  <rect x="280" y="332" width="36" height="22" fill="#6D4F30"/>
  <rect x="340" y="333" width="70" height="22" fill="#F5DFA5" opacity="0.85"/>
  <!-- ground glow -->
  <g fill="#F0C985" opacity="0.35">
    <ellipse cx="220" cy="380" rx="40" ry="10"/>
    <ellipse cx="340" cy="375" rx="55" ry="12"/>
    <ellipse cx="460" cy="380" rx="44" ry="10"/>
  </g>
  <!-- stones -->
  <g fill="#423E36">
    <ellipse cx="80" cy="400" rx="40" ry="12"/>
    <ellipse cx="540" cy="405" rx="35" ry="10"/>
  </g>
  <!-- landscape lights -->
  <circle cx="130" cy="385" r="3" fill="#FFDB85"/><circle cx="130" cy="385" r="10" fill="#FFDB85" opacity="0.3"/>
  <circle cx="545" cy="385" r="3" fill="#FFDB85"/><circle cx="545" cy="385" r="10" fill="#FFDB85" opacity="0.3"/>
  <!-- stars -->
  <g fill="#F5EEE0" opacity="0.5">
    <circle cx="100" cy="50" r="0.8"/><circle cx="200" cy="30" r="0.6"/><circle cx="360" cy="45" r="0.8"/><circle cx="500" cy="60" r="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="30" y="60" font-family="Fraunces, Georgia, serif" font-size="26" fill="#F5EEE0" letter-spacing="0.02em">DOLDAM<tspan font-style="italic" font-weight="300" font-size="20" dx="2">Stay</tspan></text>
  <text x="30" y="82" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="11" fill="#F5EEE0" opacity="0.7" letter-spacing="0.08em">Boutique pension · Jeju</text>
</svg>
