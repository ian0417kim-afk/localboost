<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8E6DF"/><stop offset="1" stop-color="#CCC8BD"/>
    </linearGradient>
    <linearGradient id="warmI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9B778"/><stop offset="1" stop-color="#B36F3E"/>
    </linearGradient>
    <linearGradient id="concI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B5B1A8"/><stop offset="1" stop-color="#7E7A71"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="#FAFAFA"/>
  <!-- architectural line divider -->
  <line x1="30" y1="60" x2="570" y2="60" stroke="#0E0E10" stroke-width="1"/>
  <text x="30" y="50" font-family="Archivo, Pretendard, sans-serif" font-size="12" font-weight="500" fill="#0E0E10" letter-spacing="0.1em">DANDAM STUDIO · INTERIOR · ARCHITECTURE</text>

  <!-- main architectural render -->
  <g transform="translate(30 100)">
    <rect width="540" height="280" fill="url(#skyI)"/>
    <!-- ground -->
    <rect x="0" y="240" width="540" height="40" fill="#B8B2A5"/>
    <!-- concrete tower back -->
    <rect x="380" y="30" width="140" height="230" fill="#88847A"/>
    <rect x="380" y="30" width="140" height="230" fill="url(#concI)" opacity="0.5"/>
    <rect x="440" y="50" width="20" height="195" fill="#1C1C20"/>
    <!-- front block -->
    <rect x="90" y="95" width="260" height="170" fill="#9B9688"/>
    <rect x="90" y="95" width="260" height="170" fill="url(#concI)" opacity="0.4"/>
    <!-- large warm window -->
    <rect x="115" y="130" width="210" height="110" fill="url(#warmI)"/>
    <line x1="185" y1="130" x2="185" y2="240" stroke="#4B4138" stroke-width="2"/>
    <line x1="255" y1="130" x2="255" y2="240" stroke="#4B4138" stroke-width="2"/>
    <line x1="115" y1="185" x2="325" y2="185" stroke="#4B4138" stroke-width="2"/>
    <ellipse cx="215" cy="215" rx="8" ry="22" fill="#3A2820" opacity="0.6"/>
    <!-- wood overhang -->
    <rect x="90" y="95" width="260" height="14" fill="#5E4A36"/>
    <!-- entrance -->
    <rect x="145" y="235" width="40" height="45" fill="#1C1A18"/>
    <!-- steps -->
    <rect x="115" y="266" width="95" height="5" fill="#706B5F"/>
    <rect x="122" y="272" width="82" height="5" fill="#817C6F"/>
    <!-- tree -->
    <rect x="50" y="180" width="5" height="80" fill="#2F2B24"/>
    <ellipse cx="52" cy="170" rx="26" ry="36" fill="#4F5440" opacity="0.85"/>
  </g>

  <!-- Portfolio year big -->
  <text x="30" y="425" font-family="Archivo, Pretendard, sans-serif" font-size="38" font-weight="900" fill="#0E0E10" letter-spacing="-0.03em">2026 Portfolio</text>
  <text x="420" y="425" font-family="Archivo, Pretendard, sans-serif" font-size="11" font-weight="500" fill="#6B6B72" letter-spacing="0.1em">HANNAM TRIPLEX · 2025</text>
</svg>
